<div class="card">
    <div class="flex justify-between col-12 gap-2 mb-3">
        <!-- <div>
            <button pButton class="font-semibold p-button-outlined justify-center" icon="pi pi-file" label="Nuevo"></button>
        </div> -->
        <div class="flex border-round fonthead w-full align-items-center">
            <span class="text-base font-bold m-2">GESTIÓN DE ACCIONES</span>
        </div>
    </div>
    <!-- <div class="flex border-round mt-2 p-2 fonthead w-full align-items-center gap-3">
        <button pButton variant="outlined" icon="pi pi-file" label="Nuevo"></button>
        <span class="text-base font-semibold mt-2">OPORTUNIDADES</span>

    <form [formGroup]="frmDatos" class="p-fluid grid">
        <div class="flex flex-wrap gap-3 lg:w-1/1 mb-6">
            <div class="flex flex-col gap-1">
                <label class="font-semibold">Desde</label>
                <p-datepicker formControlName="fechaini" dateFormat="dd/mm/yy" inputId="yearpicker" [showIcon]="true" size="small"></p-datepicker>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-semibold">Hasta</label>
                <p-datepicker formControlName="fechafin" dateFormat="dd/mm/yy" inputId="yearpicker" [showIcon]="true" size="small"></p-datepicker>
            </div>
            <!-- <div class="flex flex-col grow basis-0 gap-1">
                <label class="font-semibold">Vendedor</label>
                <p-select [options]="Vendedor" formControlName="idvendedor" placeholder="Seleccionar Vendedor..." optionLabel="name"
                 optionValue="idusuario" size="small" [filter]="true" ></p-select>
            </div> -->
            <div class="flex flex-col grow basis-0 gap-1">
                <label class="font-semibold">Cliente</label>
                <p-select
                    [options]="lstProveedores()"
                    formControlName="idcliente"
                    id="idcliente"
                    placeholder="Seleccionar Cliente..."
                    optionLabel="nomcomercial"
                    optionValue="idcliente"
                    size="small"
                    [filter]="true"
                    (onChange)="listarOportunidades()"
                ></p-select>
            </div>
            <div class="flex flex-col grow gap-1">
                <label class="font-semibold">Oportunidad</label>
                <p-select [options]="lstOportunidad()" formControlName="idoportunidad" placeholder="Seleccionar Oportunidad..." optionLabel="nomcomercial" optionLabel="titulo" appendTo="body" [filter]="true" optionValue="id" size="small"></p-select>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <button pButton type="button" pTooltip="Consultar" tooltipPosition="bottom" class="font-semibold mt-5 h-3rem w-3rem w-auto bg-blue-500 ml-2" icon="pi pi-search" (click)="getBuscar()"></button>
            </div>
        </div>
    </form>

    <p-table
        #dt1
        [value]="listaAcciones()"
        [rows]="25"
        [rowHover]="true"
        [tableStyle]="{'min-width': '50rem'}"
        [paginator]="true"
        [showCurrentPageReport]="true"
        [resizableColumns]="true"
        [rowsPerPageOptions]="[25,50]"
        selectionMode="single"
        currentPageReportTemplate="Mostrando {first} al {last} de {totalRecords} Registros"
        size="small"
    >
        <ng-template pTemplate="header">
            <tr>
                <th style="width: 20px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">N°</div>
                </th>
                <th style="width: 200px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">CLIENTE</div>
                </th>
                <th style="width: 200px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">OPORTUNIDAD</div>
                </th>
                <th style="width: 70px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">FECHA</div>
                </th>
                <th style="width: 80px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">PRIORIDAD</div>
                </th>
                <th>PLAN ACCIÓN</th>
                <th style="width: 120px" class="bg-teal-50 border-1">
                    <div class="flex justify-between align-items-center">ESTADO</div>
                </th>
                <th style="width: 80px" class="bg-teal-50 border-1">
                    <!-- <div class="flex justify-between align-items-center">TRANSACCIONES</div> -->
                </th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-data let-rowIndex="rowIndex">
            <tr style="line-height: 1">
                <td style="padding: 3px 8px">{{rowIndex + 1}}</td>
                <td style="padding: 3px 8px">{{data.cliente }}</td>
                <td style="padding: 3px 8px">{{data.oportunidad}}</td>
                <td style="padding: 3px 8px">{{data.s_fechaini}}</td>
                <td style="padding: 3px 8px">{{ data.desprioridad}}</td>
                <td style="padding: 3px 8px">{{ data.descripcion | uppercase}}</td>
                <td style="padding: 3px 8px">
                    <p-tag [value]="data.nomestado" [severity]="getSeverity(data.nomestado)"></p-tag>
                </td>
                <td style="padding: 3px 4px">
                    <div class="flex align-items-center m:justify-end">
                        <button pButton pRipple type="button" icon="pi pi-file-edit" tooltipPosition="left" pTooltip="Editar Plan de Acción" 
                        class="p-button-rounded p-button-text z-3 ml-auto sm:ml-0" (click)="onAccion(data)"></button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="11">No se encontraron registros.</td>
            </tr>
        </ng-template>
        <ng-template pTemplate="loadingbody">
            <tr>
                <td colspan="11">Cargando datos. Espere por favor.</td>
            </tr>
        </ng-template>
    </p-table>
