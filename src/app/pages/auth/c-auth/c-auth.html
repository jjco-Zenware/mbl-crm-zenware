<div class="flex items-center justify-center min-h-screen bg-cover" style="background-image: url('assets/demo/images/logo/fondo_regis_contac.png')">
    <div class="flex flex-col items-center justify-center">
        <div class="w-full bg-surface-0 dark:bg-surface-900 py-10 px-10 sm:px-10" style="border-radius: 25px">
            <div class="text-center mb-4">
                <div class="flex justify-center">
                    <img src="assets/demo/images/logo/logo_color_fon_blanco.png" style="height: 220px" />
                </div>
                <div class="text-surface-900 dark:text-surface-0 text-2xl font-medium mb-2 -mt-4">Welcome to Zenware!</div>
                <span class="text-muted-color font-medium">Sign in to continue</span>
            </div>

            <div>
                 @if(!visibleNombre()){
            <app-c-auth-usuario (OB_pass)="getPasoPass($event)" (OS_nombreUser)="getUsuario($event)" />
            } @if(visibleNombre()){
            <app-c-auth-clave [IS_nombreUser]="nombreUsuario" />
            }
            </div>
        </div>
    </div>
</div>
<p-toast></p-toast>
