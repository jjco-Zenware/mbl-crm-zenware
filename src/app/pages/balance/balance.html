<div class="col-span-12 card gap-3">
    <div class="flex justify-between col-12 gap-2 mb-3">
        <div class="flex border-round fonthead w-full align-items-center">
            <span class="text-lg font-bold m-2">Balance de Actividades</span>
        </div>
    </div>

    <div class="flex flex-wrap justify-between lg:w-1/1 p-2 gap-6">
        <div class="flex flex-col gap-1">
            <label class="font-semibold">Periodo</label>
            <p-datepicker view="month" [(ngModel)]="periodo" dateFormat="mm/yy" inputId="yearpicker" [showIcon]="true" size="small" (onSelect)="getBuscar()" appendTo="body"></p-datepicker>
        </div>

        <div class="flex gap-1">
            <span class="block text-muted-color font-bold text-lg">N° ACCIONES : </span>
            <div class="flex items-center justify-center bg-red-100 dark:bg-red-400/10 rounded-border ml-2" style="width: 2.5rem; height: 2rem">
                <div class="text-red-900 dark:text-surface-0 font-bold text-xl">{{tot_acciones}}</div>
            </div>
        </div>
    </div>

    <div class="col-span-12 md:col-span-12">
        <p-divider />
    </div>

    <p-card>
        <p-chart type="bar" [data]="data" [options]="options" class="h-[20rem]" />
    </p-card>
