
@if(verDashboard()){
<div class="grid grid-cols-12 gap-1">
    <div class="flex align-items-center col-span-12 md:col-span-8 p-3">
        <div class="text-4xl">👋</div>
        <div class="flex flex-col gap-1 text-600">
            <span class="text-2xl font-semibold">Hola,<span class="text-primary"> {{nomUsuario}}!</span></span>
            <span class="font-bold text-primary">{{nomPerfil}}</span>
        </div>
    </div>
    <div class="card m-4 flex flex-col gap-4 lg:col-span-12">
        <div class="flex flex-wrap gap-2 col-span-12 md:col-span-12">
            <div class="flex flex-col grow basis-0 gap-1">
                <label>Estado</label>
                <p-multiSelect [options]="events()" size="small" [(ngModel)]="selectedEstados" optionLabel="title" placeholder="Seleccionar..." />
            </div>
            <div class="flex flex-col gap-1">
                <label>Quarter</label>
                <p-multiSelect [options]="lstQ" size="small" [(ngModel)]="selectedQ" placeholder="Seleccionar..." optionLabel="desQ" />
            </div>
            <div class="flex flex-col gap-1">
                <label>Prob. Cierre %</label>
                <p-inputNumber [(ngModel)]="porcierre" locale="es-PE" mode="decimal" name="por_cierre" [min]="0" [max]="100" size="small"></p-inputNumber>
            </div>
            <div class="flex flex-col gap-1">
                <label>Monto</label>
                <p-select [options]="lstDesMontos" [(ngModel)]="idmonto" id="idmonto" placeholder="Seleccionar..." optionLabel="desmonto" optionValue="id" size="small"></p-select>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label>Producto/Servicio</label>
                <p-select [options]="lstTipoProducto()" [(ngModel)]="idtipoprod" size="small" placeholder="Seleccionar..." optionLabel="nomtipoproducto" filter="true" [ngModelOptions]="{ standalone: true }" optionValue="idtipoprod"></p-select>
            </div>
        </div>
        <div class="flex flex-wrap gap-2 col-span-12 md:col-span-12 mt-3">
            <div class="flex flex-col grow basis-0 gap-1">
                <label>Cliente</label>
                <p-select [options]="Clientes()" [(ngModel)]="idcliente" id="idcliente" placeholder="Seleccionar..." optionLabel="nomcomercial" [ngModelOptions]="{ standalone: true }" optionValue="idcliente" size="small" [filter]="true"></p-select>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label>Sector</label>
                <p-select [options]="lstEnti()" [(ngModel)]="tipoentidad" id="tipoentidad" optionLabel="name" [ngModelOptions]="{ standalone: true }" optionValue="id" placeholder="Seleccionar..." size="small"></p-select>
            </div>
            <div class="flex flex-col gap-1">
                <label>Año</label>
                <p-datepicker [(ngModel)]="annio" view="year" dateFormat="yy" inputId="yearpicker" [showIcon]="true" size="small"></p-datepicker>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label>Vendedor</label>
                <p-select [options]="Vendedor()" [(ngModel)]="idvendedor" id="idvendedor" placeholder="Seleccionar..." optionLabel="name" [ngModelOptions]="{ standalone: true }" optionValue="idusuario" [filter]="true" size="small"></p-select>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label>PreVenta</label>
                <p-select [options]="Preventa()" [(ngModel)]="idpreventa" id="idpreventa" placeholder="Seleccionar..." optionLabel="name" [ngModelOptions]="{ standalone: true }" optionValue="idusuario" [filter]="true" size="small"></p-select>
            </div>
            <div class="flex flex-col mt-2">
                <button pButton type="button" (click)="consultarData2()" pTooltip="Consultar" tooltipPosition="bottom" class="font-semibold mt-3 justify-content-center h-3rem w-3rem w-auto bg-blue-500 ml-2" icon="pi pi-search"></button>
            </div>
        </div>
    </div>

   

    <div class="flex flex-wrap gap-4 col-span-12 lg:col-span-12">
        <div class="grid grid-cols-12 flex flex-col justify-between m-2">
            <div class="col-span-12">
                <app-c-dist-oportunidad [IS_codigo]="0" [IA_data]="dataCT" />
            </div>
            <div class="col-span-12">
                <p-divider />
            </div>

            <div class="col-span-12">
                <app-c-lst-oportunidad (verBussines)="verBussines($event)" (verQuote)="verQuote($event)" (verMntOportunidad)="verMntOportunidad($event)" [IA_data]="dataCT" />
            </div>
        </div>
    </div>
</div>

} @if(visQuote()){<app-c-cotizacion [IA_data]="dataCT" (OB_back)="getOportunidadKanban($event)" />} @if(visBussines()){<app-c-business-case [IS_codigo]="codigoBC" (OB_back)="getOportunidadKanban($event)" />}
@if(blockedDocumentk()){<app-c-progress-spinner [IS_mensaje]="mensajeSpinner"></app-c-progress-spinner>} @if (visMntOportunidad()) {<app-c-lead-reg [IS_Data]="dataOportunidad" (OB_back)="getOportunidadKanban($event)" />}
<p-toast />

<p-confirmdialog />
