<p-table #dt1 [value]="lstContactosDeci()" [rowHover]="true" [tableStyle]="{'min-width': '40rem'}" selectionMode="single" size="small">
    <ng-template pTemplate="header">
        <tr>
            <th>N°</th>
            <th>Rol en Decisión</th>
            <th>Nombre</th>
            <th>Cargo</th>
            <th>Email</th>
            <th>Telefono</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-data let-rowIndex="rowIndex">
        <tr>
            <td>{{rowIndex + 1}}</td>
            <td>{{data.nomtiporol}}</td>
            <td>
                 <div class="flex items-center gap-2">
                    <!-- <img [alt]="data.label" src="{{data.image }}" style="width: 32px" /> -->
                    <p-avatar image="{{ data.image }}" shape="circle"></p-avatar>
                    <span>{{ data.nombrecontacto }}</span>
                </div>
            </td>
            <td>{{data.cargo}}</td>
            <td>{{data.email}}</td>
            <td>{{data.telefono }}</td>
        </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
        <tr>
            <td colspan="11">No se encontraron registros.</td>
        </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
        <tr>
            <td colspan="11">Cargando datos. Espere por favor.</td>
        </tr>
    </ng-template>
</p-table>
