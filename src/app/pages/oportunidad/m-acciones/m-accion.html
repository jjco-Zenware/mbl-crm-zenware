<form [formGroup]="frmAccion" class="w-full">
    <div class="card flex flex-col gap-3 p-fluid">
        <div class="flex flex-col gap-2">
            <label class="font-semibold">Oportunidad </label>
            <span>{{ nomoportunidad | uppercase }}</span>
        </div>
        <div class="flex flex-col gap-2">
            <label class="font-semibold">Cliente </label>
            <span>{{ nomcliente | uppercase }}</span>
        </div>
        @if (tipopro() === 1) {
            <p-divider align="left" type="solid"><b>Ultima Acción</b></p-divider>
        }
        <div class="flex flex-wrap gap-2">
            <div class="flex flex-col grow basis-0 gap-1">
                <label class="block text-900 font-semibold">Fecha </label>
                <p-datepicker dateFormat="dd/mm/yy" formControlName="fecplan_ant" inputId="fecplan_ant" [showIcon]="true" size="small" appendTo="body"></p-datepicker>
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label class="block text-900 font-semibold">Prioridad </label>

                <p-select [options]="lstPrioridad()" formControlName="idprioridad_ant" optionLabel="valoritem" optionValue="iditem" size="small" />
            </div>
            <div class="flex flex-col grow basis-0 gap-1">
                <label class="block text-900 font-semibold">Tipo </label>
                <p-select [options]="lstTipoTarea()" formControlName="idtipotarea_ant" optionLabel="valoritem" optionValue="iditem" size="small" />
            </div>
        </div>
        <div class="flex flex-col">
            <label class="font-semibold">Acción </label>
            <textarea pInputText type="text" formControlName="desplan_ant" size="small" class="w-auto"></textarea>
        </div>

        @if (tipopro() === 3) {
            <div class="flex flex-col">
                <label class="font-semibold">Resultado </label>
                <textarea pInputText type="text" formControlName="resultado" size="small" class="w-auto"></textarea>
            </div>
        }
       
        @if (tipopro() === 1) {
             <div class="flex flex-col">
                <label class="font-semibold">Resultado </label>
                <textarea pInputText type="text" formControlName="resultado" size="small" class="w-auto"></textarea>
            </div>
            <p-divider align="left" type="solid"><b>Siguiente Acción</b></p-divider>
            <div class="flex flex-wrap gap-2">
                <div class="flex flex-col grow basis-0 gap-1">
                    <label class="block text-900 font-semibold">Fecha </label>
                    <p-datepicker dateFormat="dd/mm/yy" formControlName="fecplan" inputId="fecplan" [showIcon]="true" size="small" appendTo="body"></p-datepicker>
                </div>
                <div class="flex flex-col grow basis-0 gap-1">
                    <label class="block text-900 font-semibold">Prioridad </label>
                    <p-select [options]="lstPrioridad()" formControlName="idprioridad" optionLabel="valoritem" optionValue="iditem" size="small" appendTo="body"></p-select>
                </div>
                <div class="flex flex-col grow basis-0 gap-1">
                <label class="block text-900 font-semibold">Tipo </label>
                <p-select [options]="lstTipoTarea()" formControlName="idtipotarea" optionLabel="valoritem" optionValue="iditem" size="small" appendTo="body"></p-select>
            </div>
            </div>
            <div class="flex flex-col">
                <label class="font-semibold">Acción </label>
                <textarea pInputText type="text" formControlName="desplan" size="small" class="w-auto"></textarea>
            </div>
        }
        <div>
            @if (tipopro() === 3) {
                <button pButton pRipple icon="pi pi-check-circle" label="Culminar" class="button-primary w-auto" (click)="completarTarea2()"></button>
            }
            @if (tipopro() !== 3) {
                <button pButton pRipple icon="pi pi-save" label="Guardar" class="button-primary w-auto" (click)="prcPlanAccion()"></button>
            }
            
        </div>
    </div>
</form>
<p-toast />
